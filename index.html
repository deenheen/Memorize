<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의학용어 암기 마스터</title>
    <style>
        /* 기본 스타일 설정 (미니멀리즘) */
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F9FAFB;
            --text-main: #333333;
            --text-sub: #6B7280;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 검색 영역 (초기 화면 중앙) */
        #search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            transition: all 0.5s ease-in-out;
        }

        #search-container.active {
            height: auto;
            margin-top: 3rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .search-bar {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 50px;
            background: transparent;
        }

        .search-bar .icons {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            color: var(--text-sub);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .search-bar button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-bar button:hover {
            background-color: #357ABD;
        }

        /* 결과 영역 (세로 배열 리스트) */
        #results-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            gap: 1.5rem;
            padding: 0 1rem 3rem 1rem;
        }

        .word-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .word-title h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        .word-title p {
            margin: 0.5rem 0 0 0;
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        .refresh-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-sub);
            padding: 0.5rem;
            border-radius: 50%;
            transition: background-color 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .refresh-btn:hover {
            background-color: #F3F4F6;
            color: var(--primary-color);
        }

        .mnemonic-content {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .mnemonic-tag {
            display: inline-block;
            background-color: #E0E7FF;
            color: #4338CA;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            margin-right: 0.5rem;
        }

        .mnemonic-text {
            margin-top: 0.5rem;
        }

        .mnemonic-text strong {
            color: #111827;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <h1>의학용어 암기 마스터</h1>
        <div class="search-bar">
            <div class="icons" title="파일/이미지 첨부">
                📎 📷
            </div>
            <input type="text" id="word-input" placeholder="단어, 파일, 혹은 이미지를 입력하세요" onkeypress="handleEnter(event)">
            <button onclick="generateMnemonics()">암기법 변환</button>
        </div>
    </div>

    <div id="results-container">
        </div>

    <script>
        // 예시 데이터베이스 (각 단어당 여러 개의 암기법을 배열로 저장)
        const mnemonicDB = [
            {
                word: "Radius / Ulnar",
                meaning: "요골(노뼈) / 척골(자뼈)",
                mnemonics: [
                    {
                        type: "연상법 / 비유",
                        text: "<strong>얼라(Ulnar)</strong>는 안에서 키우고 <strong>라디오(Radius)</strong>는 밖에서 들어라! (해부학적 자세 기준 새끼손가락 쪽이 Ulnar, 엄지손가락 쪽이 Radius)"
                    },
                    {
                        type: "형태 변환",
                        text: "Ulnar의 'U'는 움푹 들어간 안쪽을, Radius의 'R'은 바깥으로 뻗은 라운드(Round) 형태를 연상하세요."
                    }
                ]
            },
            {
                word: "Erythrocyte",
                meaning: "적혈구",
                mnemonics: [
                    {
                        type: "어원 조합 / 발음 변환",
                        text: "<strong>Erythro(에리쓰로)</strong>: 레드 와인을 마시고 얼굴이 빨개진 상태 연상 (빨강) + <strong>Cyto</strong>: 세포 = <strong>빨간 세포</strong>"
                    },
                    {
                        type: "이미지 연상",
                        text: "에리(Ery)가 스로(thro) 던진 붉은색 혈액 공(세포)을 떠올려보세요."
                    }
                ]
            },
            {
                word: "Myoma",
                meaning: "근종",
                mnemonics: [
                    {
                        type: "발음 변환 / 조합",
                        text: "<strong>Myo(마이오)</strong>: 자아도취된 근육맨 연상 + <strong>Oma(엄마)</strong>: '엄마가 걱정하는 종양' = <strong>근육에 생긴 종양</strong>"
                    },
                    {
                        type: "스토리텔링",
                        text: "'마이(My) 오마(Oma) 갓! 내 근육에 종양이 생기다니!' 하고 깜짝 놀라는 상황을 상상해 보세요."
                    }
                ]
            }
        ];

        // 현재 각 단어 카드가 어떤 암기법 인덱스를 보여주고 있는지 추적하는 객체
        const currentMnemonicIndex = {};

        // 엔터키 입력 처리
        function handleEnter(event) {
            if (event.key === 'Enter') {
                generateMnemonics();
            }
        }

        // 암기법 생성 시작 함수
        function generateMnemonics() {
            const searchContainer = document.getElementById('search-container');
            const resultsContainer = document.getElementById('results-container');
            const inputVal = document.getElementById('word-input').value;

            // 검색창을 위로 올리고 결과를 보여주는 UI 전환
            searchContainer.classList.add('active');
            document.querySelector('h1').style.fontSize = '1.5rem';
            resultsContainer.style.display = 'flex';

            // 결과 컨테이너 초기화
            resultsContainer.innerHTML = '';

            // DB에 있는 예시 데이터를 순회하며 카드 렌더링
            mnemonicDB.forEach((item, index) => {
                // 초기 인덱스는 0으로 설정
                currentMnemonicIndex[index] = 0;
                
                const card = document.createElement('div');
                card.className = 'word-card';
                card.id = `card-${index}`;
                
                renderCardContent(card, index, item);
                resultsContainer.appendChild(card);
            });
        }

        // 카드 내부 HTML을 렌더링하는 함수
        function renderCardContent(cardElement, index, item) {
            const mnemonic = item.mnemonics[currentMnemonicIndex[index]];
            
            cardElement.innerHTML = `
                <div class="word-header">
                    <div class="word-title">
                        <h2>${item.word}</h2>
                        <p>${item.meaning}</p>
                    </div>
                    <button class="refresh-btn" onclick="refreshMnemonic(${index})" title="다른 암기법 보기">
                        🔄 <span>새로고침</span>
                    </button>
                </div>
                <div class="mnemonic-content">
                    <span class="mnemonic-tag">${mnemonic.type}</span>
                    <div class="mnemonic-text">${mnemonic.text}</div>
                </div>
            `;
        }

        // 개별 카드 새로고침(다른 암기법으로 전환) 함수
        function refreshMnemonic(index) {
            const item = mnemonicDB[index];
            const maxIndex = item.mnemonics.length;
            
            // 다음 인덱스로 이동 (마지막이면 다시 처음으로)
            currentMnemonicIndex[index] = (currentMnemonicIndex[index] + 1) % maxIndex;
            
            const cardElement = document.getElementById(`card-${index}`);
            
            // 시각적 효과를 위해 투명도 조절
            cardElement.style.opacity = '0.5';
            setTimeout(() => {
                renderCardContent(cardElement, index, item);
                cardElement.style.opacity = '1';
                cardElement.style.transition = 'opacity 0.3s ease';
            }, 150);
        }
    </script>
</body>
</html>
