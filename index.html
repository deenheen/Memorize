<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의학용어 암기 마스터</title>
    <style>
        /* 기본 스타일 설정 (미니멀리즘) */
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F9FAFB;
            --text-main: #333333;
            --text-sub: #6B7280;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 검색 영역 */
        #search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            transition: all 0.5s ease-in-out;
        }

        #search-container.active {
            height: auto;
            margin-top: 3rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .search-bar {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 0.5rem;
            transition: all 0.3s ease;
        }

        .search-bar input {
            flex: 1;
            border: none;
            outline: none;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 50px;
            background: transparent;
        }

        .search-bar .icons {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            color: var(--text-sub);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .search-bar button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-bar button:hover {
            background-color: #357ABD;
        }

        /* 결과 영역 */
        #results-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            gap: 1.5rem;
            padding: 0 1rem 3rem 1rem;
        }

        .word-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .word-title h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        .word-title p {
            margin: 0.5rem 0 0 0;
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        /* 피드백 버튼 (Thumbs Up/Down) */
        .feedback-btns {
            display: flex;
            gap: 0.5rem;
        }

        .thumb-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
        }

        .thumb-btn:hover {
            background-color: #F3F4F6;
            transform: scale(1.1);
        }

        /* Toast 알림 메시지 스타일 */
        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(31, 41, 55, 0.9);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease, bottom 0.3s ease;
            z-index: 1000;
        }

        #toast.show {
            opacity: 1;
            visibility: visible;
            bottom: 50px;
        }

        .mnemonic-content {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .mnemonic-tag {
            display: inline-block;
            background-color: #E0E7FF;
            color: #4338CA;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            margin-right: 0.5rem;
        }

        .mnemonic-text {
            margin-top: 0.5rem;
        }

        .mnemonic-text strong {
            color: #111827;
        }
        
        .mnemonic-text span.highlight {
            color: #E11D48;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="search-container">
        <h1>의학용어 암기 마스터</h1>
        <div class="search-bar">
            <div class="icons" title="파일/이미지 첨부">
                📎 📷
            </div>
            <input type="text" id="word-input" placeholder="단어, 파일, 혹은 이미지를 입력하세요 (엔터 또는 버튼 클릭)" onkeypress="handleEnter(event)">
            <button onclick="generateMnemonics()">암기법 변환</button>
        </div>
    </div>

    <div id="results-container"></div>

    <div id="toast">확인했습니다. 앞으로 유사한 암기법이 자주 사용됩니다.</div>

    <script>
        // 경선식 스타일 + 유저 피드백이 듬뿍 담긴 데이터베이스
        const mnemonicDB = [
            {
                word: "Radius / Ulnar",
                meaning: "요골(노뼈) / 척골(자뼈)",
                mnemonics: [
                    { type: "상황 연상법", text: "<strong><span class='highlight'>얼라(Ulnar)</span></strong>는 안에서 키우고 <strong><span class='highlight'>라디오(Radius)</span></strong>는 밖에서 들어라! (해부학적 자세 기준 새끼손가락 쪽 안쪽 뼈가 Ulnar, 엄지손가락 쪽 바깥쪽 뼈가 Radius)" },
                    { type: "형태 변환", text: "Ulnar의 'U'는 움푹 들어간 안쪽 뼈, Radius의 'R'은 바깥으로 둥글게(Round) 뻗은 뼈를 연상하세요." }
                ]
            },
            {
                word: "Leiomyoma",
                meaning: "평활근종 (매끈한 근육에 생기는 양성 종양)",
                mnemonics: [
                    { type: "발음 변환 종합세트", text: "<strong><span class='highlight'>레이(Lei)</span></strong>저 쫙~ 쏴서 제모했더니 피부가 <strong>매끈한!</strong><br><strong><span class='highlight'>마이 옷(Myo)</span></strong>! 내 옷이 빵빵한 <strong>근육</strong> 때문에 터질 것 같아!<br><strong><span class='highlight'>오마(Oma)</span></strong>이갓! 내 몸에 <strong>종양</strong>이 생기다니!<br><br>👉 <strong>합체:</strong> 매끈하게(Lei) 레이저 제모한 마이 옷(Myo) 터질듯한 근육맨이 '오마(Oma)이갓! 종양이라니!' 하고 절망하는 모습." },
                    { type: "어원 조합", text: "Lei(매끈한) + myo(근육) + oma(종양) = 매끈한 근육에 생긴 종양." }
                ]
            },
            {
                word: "Cyanosis",
                meaning: "청색증 (피부와 점막이 푸르게 변하는 증상)",
                mnemonics: [
                    { type: "이미지 연상", text: "<strong><span class='highlight'>Cyano(싸이언)</span></strong> 👉 기를 너무 많이 모아서 노랗다 못해 <strong>파란색</strong>으로 변해버린 <strong>초사이언</strong> 블루! (파란색)" },
                    { type: "상황 연상", text: "<strong><span class='highlight'>싸늘(Cyan)</span></strong> 👉 추운 겨울 밖에서 벌벌 떨었더니 얼굴이 <strong>싸늘(Cyan)</strong>하게 식어서 <strong>파랗게</strong> 질린 모습. (-osis는 질환을 뜻하므로 파랗게 질린 병)" }
                ]
            },
            {
                word: "Etiology",
                meaning: "병인학 (질병의 원인을 연구하는 학문)",
                mnemonics: [
                    { type: "상황 연상", text: "<strong><span class='highlight'>에티(Eti)</span></strong> 👉 맨체스터 시티 리그 우승의 가장 큰 <strong>원인</strong>은 <strong>에티</strong>하드(Etihad) 항공사의 빵빵한 스폰서십 때문이지!" },
                    { type: "발음 변환", text: "<strong><span class='highlight'>에취(Eti)</span></strong> 👉 <strong>에취!</strong> 하고 재채기를 계속하는 <strong>원인</strong>이 대체 뭐야? 감기야 비염이야? (에취(Eti)하는 원인을 찾는 학문(-ology))" }
                ]
            }
        ];

        const currentMnemonicIndex = {};
        let toastTimeout;

        function handleEnter(event) {
            if (event.key === 'Enter') {
                generateMnemonics();
            }
        }

        function generateMnemonics() {
            const searchContainer = document.getElementById('search-container');
            const resultsContainer = document.getElementById('results-container');

            searchContainer.classList.add('active');
            document.querySelector('h1').style.fontSize = '1.5rem';
            resultsContainer.style.display = 'flex';
            resultsContainer.innerHTML = '';

            mnemonicDB.forEach((item, index) => {
                currentMnemonicIndex[index] = 0;
                const card = document.createElement('div');
                card.className = 'word-card';
                card.id = `card-${index}`;
                renderCardContent(card, index, item);
                resultsContainer.appendChild(card);
            });
        }

        function renderCardContent(cardElement, index, item) {
            const mnemonic = item.mnemonics[currentMnemonicIndex[index]];
            
            cardElement.innerHTML = `
                <div class="word-header">
                    <div class="word-title">
                        <h2>${item.word}</h2>
                        <p>${item.meaning}</p>
                    </div>
                    <div class="feedback-btns">
                        <button class="thumb-btn up" onclick="handleThumbsUp()" title="이 암기법이 좋아요">👍</button>
                        <button class="thumb-btn down" onclick="handleThumbsDown(${index})" title="다른 암기법 보기">👎</button>
                    </div>
                </div>
                <div class="mnemonic-content">
                    <span class="mnemonic-tag">${mnemonic.type}</span>
                    <div class="mnemonic-text">${mnemonic.text}</div>
                </div>
            `;
        }

        // Thumbs Down: 다른 암기법으로 교체
        function handleThumbsDown(index) {
            const item = mnemonicDB[index];
            const maxIndex = item.mnemonics.length;
            currentMnemonicIndex[index] = (currentMnemonicIndex[index] + 1) % maxIndex;
            
            const cardElement = document.getElementById(`card-${index}`);
            cardElement.style.opacity = '0.5';
            setTimeout(() => {
                renderCardContent(cardElement, index, item);
                cardElement.style.opacity = '1';
                cardElement.style.transition = 'opacity 0.3s ease';
            }, 150);
        }

        // Thumbs Up: Toast 메시지 띄우기
        function handleThumbsUp() {
            const toast = document.getElementById('toast');
            
            if (toastTimeout) {
                clearTimeout(toastTimeout);
            }
            
            toast.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
