<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의학용어 암기 마스터 - OCR 스캔 버전</title>
    <style>
        /* 기본 스타일 설정 (미니멀리즘) */
        :root {
            --primary-color: #4A90E2;
            --bg-color: #F9FAFB;
            --text-main: #333333;
            --text-sub: #6B7280;
            --card-bg: #FFFFFF;
            --border-color: #E5E7EB;
            --star-color: #F59E0B;
            --highlight-color: #10B981; /* OCR 선택 시 테두리 색상 */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 상단 네비게이션 탭 */
        .top-nav {
            width: 100%;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .nav-inner {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary-color);
            cursor: pointer;
        }

        .tab-menu {
            display: flex;
            gap: 1rem;
        }

        .tab-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            padding: 1rem 0.5rem;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom: 3px solid var(--primary-color);
        }

        .bookmark-count-badge {
            background-color: var(--primary-color);
            color: white;
            font-size: 0.75rem;
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            margin-left: 4px;
        }

        /* 검색 영역 */
        #search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100vh - 60px);
            width: 100%;
            transition: all 0.5s ease-in-out;
            padding: 0 1rem;
            box-sizing: border-box;
        }

        #search-container.active {
            height: auto;
            margin-top: 3rem;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        .search-bar {
            display: flex;
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: 50px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 0.5rem;
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
        }

        .search-bar input[type="text"] {
            flex: 1;
            border: none;
            outline: none;
            padding: 1rem 0.5rem 1rem 1.5rem;
            font-size: 1.1rem;
            border-radius: 50px;
            background: transparent;
        }

        .search-bar .icons {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 15px;
            color: var(--text-sub);
            font-size: 1.4rem;
        }

        .icon-btn {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.2);
        }

        /* 파일 입력 숨기기 */
        #image-upload {
            display: none;
        }

        .search-bar button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .search-bar button.submit-btn:hover {
            background-color: #357ABD;
        }

        /* 📸 OCR 시뮬레이션 영역 (업로드된 이미지 영역) */
        #ocr-container {
            display: none;
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-top: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background: #000; /* 어두운 배경 기본값 */
        }

        #ocr-image {
            width: 100%;
            display: block;
            filter: brightness(0.4); /* 기본적으로 이미지를 어둡게 처리 */
            transition: filter 0.3s ease;
        }

        /* 스캔된 단어 핫스팟 (선택 영역) */
        .ocr-hotspot {
            position: absolute;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: all 0.2s ease;
            /* backdrop-filter를 이용해 뒤에 있는 어두운 이미지를 밝게(2.5배) 만듦 */
            backdrop-filter: brightness(2.5) contrast(1.2);
            -webkit-backdrop-filter: brightness(2.5) contrast(1.2);
            opacity: 0; /* 평소엔 숨김 */
        }

        .ocr-hotspot:hover, .ocr-hotspot.active {
            opacity: 1; /* 마우스 올리면 밝아짐 */
            border-color: var(--highlight-color);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.6);
        }

        .ocr-tooltip {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .ocr-hotspot:hover .ocr-tooltip {
            opacity: 1;
        }

        .ocr-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            color: white;
            font-size: 0.9rem;
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 결과 영역 공통 */
        .content-container {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            gap: 1.5rem;
            padding: 0 1rem 3rem 1rem;
        }

        .word-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .word-title-area {
            display: flex;
            flex-direction: column;
        }

        .word-title-top {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .word-title h2 {
            margin: 0;
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        .bookmark-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: var(--text-sub);
            cursor: pointer;
            padding: 0;
            transition: transform 0.2s;
        }

        .bookmark-btn:hover {
            transform: scale(1.1);
        }

        .bookmark-btn.active {
            color: var(--star-color);
        }

        .word-title p {
            margin: 0.5rem 0 0 0;
            font-size: 1.1rem;
            color: var(--text-sub);
        }

        .feedback-btns { display: flex; gap: 0.5rem; }
        .thumb-btn {
            background: none; border: none; font-size: 1.5rem; cursor: pointer; padding: 0.5rem;
            border-radius: 50%; transition: transform 0.2s, background-color 0.2s;
            display: flex; align-items: center; justify-content: center; width: 45px; height: 45px;
        }
        .thumb-btn:hover { background-color: #F3F4F6; transform: scale(1.1); }

        .mnemonic-content { font-size: 1.1rem; line-height: 1.6; }
        .mnemonic-tag {
            display: inline-block; background-color: #E0E7FF; color: #4338CA; padding: 0.2rem 0.6rem;
            border-radius: 4px; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; margin-right: 0.5rem;
        }
        .mnemonic-text { margin-top: 0.5rem; }
        .mnemonic-text strong { color: #111827; }
        .mnemonic-text span.highlight { color: #E11D48; font-weight: bold; }

        .divider { border: 0; height: 1px; background: var(--border-color); margin: 1.5rem 0; }
        .user-mnemonic-section { background-color: #F9FAFB; padding: 1.2rem; border-radius: 12px; border: 1px dashed #D1D5DB; transition: opacity 0.3s ease; }
        .user-mnemonic-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
        .user-mnemonic-title { font-size: 1rem; font-weight: bold; color: #4B5563; }
        .user-feedback-btns { display: flex; gap: 0.3rem; }
        .user-thumb-btn { background: #FFFFFF; border: 1px solid #E5E7EB; font-size: 1.1rem; cursor: pointer; padding: 0.3rem; border-radius: 50%; transition: all 0.2s; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .user-thumb-btn:hover { background-color: #F3F4F6; transform: scale(1.1); }
        .user-tag { display: inline-block; background-color: #10B981; color: white; padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.8rem; font-weight: 600; margin-right: 0.5rem; }

        #toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background-color: rgba(31, 41, 55, 0.9); color: white; padding: 14px 28px;
            border-radius: 50px; font-size: 1rem; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease, bottom 0.3s ease; z-index: 1000;
        }
        #toast.show { opacity: 1; visibility: visible; bottom: 50px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <div class="logo" onclick="switchTab('home')">Medi-Mnemonic</div>
            <div class="tab-menu">
                <button class="tab-btn active" id="tab-home" onclick="switchTab('home')">단어 검색</button>
                <button class="tab-btn" id="tab-wordbook" onclick="switchTab('wordbook')">나만의 단어장 <span class="bookmark-count-badge" id="bookmark-count">0</span></button>
            </div>
        </div>
    </nav>

    <div id="search-container">
        <h1>의학용어 암기 마스터</h1>
        <div class="search-bar">
            <div class="icons">
                <label for="image-upload" class="icon-btn" title="전공책/자료 사진 스캔 (OCR)">📷</label>
                <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">
                <span class="icon-btn" title="파일 첨부">📎</span>
            </div>
            <input type="text" id="word-input" placeholder="단어, 파일, 혹은 이미지를 입력하세요" onkeypress="handleEnter(event)">
            <button class="submit-btn" onclick="generateMnemonics()">암기법 변환</button>
        </div>

        <div id="ocr-container">
            <div class="ocr-header">
                <span style="display:inline-block; width:10px; height:10px; background:#10B981; border-radius:50%; box-shadow:0 0 5px #10B981;"></span>
                AI 스캔 완료! 밝게 표시된 단어를 선택하세요.
            </div>
            <img id="ocr-image" src="" alt="스캔된 이미지">
            <div id="ocr-hotspots"></div>
        </div>
    </div>

    <div id="results-container" class="content-container"></div>

    <div id="wordbook-container" class="content-container">
        <div class="empty-state" style="text-align: center; padding: 4rem 1rem; color: #6B7280;">
            아직 단어장에 추가된 단어가 없습니다.<br>
            검색 결과에서 ⭐ 버튼을 눌러 단어를 추가해 보세요!
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // --- 1. 데이터베이스 ---
        // 기존 데이터에 이번에 업로드하신 턱뼈 해부학 용어들을 추가했습니다!
        const mnemonicDB = [
            {
                word: "Coronoid process",
                meaning: "근육돌기 (아래턱뼈 앞쪽 뾰족한 돌기)",
                mnemonics: [
                    { type: "AI 연상법", text: "<strong><span class='highlight'>코로나(Coronoid)</span></strong> 바이러스의 표면처럼 뾰족하게 튀어나온 <strong>돌기(process)</strong>를 연상해 보세요! 앞쪽에서 콕 찌를 것 같은 부리 모양입니다." },
                    { type: "AI 형태 변환", text: "Coronoid의 'C'와 턱뼈 앞부분이 맞물려 근육이 꽉 붙는 형태를 떠올려보세요." }
                ],
                userMnemonics: [
                    { author: "해부학1타", text: "코 찔찔이(Coro)가 앞으로 튀어나온 돌기 ㅋㅋ" }
                ]
            },
            {
                word: "Condylar process",
                meaning: "관절돌기 (아래턱뼈 뒤쪽 둥근 돌기)",
                mnemonics: [
                    { type: "AI 연상법", text: "둥글고 매끄러운 <strong><span class='highlight'>콘(Condylar)</span></strong> 아이스크림을 상상하세요! 측두골과 부드럽게 관절을 이루기 위해 동글동글하게 생겼습니다." }
                ],
                userMnemonics: [
                    { author: "치대생K", text: "관절은 동글동글하게 굴러가야 하니까 콘(Con)모양!" }
                ]
            },
            {
                word: "Mental foramen",
                meaning: "턱끝구멍, 이공",
                mnemonics: [
                    { type: "AI 연상법", text: "<strong><span class='highlight'>멘탈(Mental)</span></strong>이 나갈 정도로 턱끝을 세게 부딪혔더니 그 자리에 <strong>구멍(foramen)</strong>이 생겼다! (해부학에서 Mental은 '턱끝'을 의미합니다)" }
                ],
                userMnemonics: [
                    { author: "보건학도", text: "턱 끝에 구멍 뚫리면 진짜 멘탈 나갈듯..." }
                ]
            },
            {
                word: "Leiomyoma",
                meaning: "평활근종 (매끈한 근육에 생기는 양성 종양)",
                mnemonics: [
                    { type: "AI 발음 변환", text: "<strong><span class='highlight'>레이(Lei)</span></strong>저 쫙~ 쏴서 제모했더니 피부가 <strong>매끈한!</strong><br><strong><span class='highlight'>마이 옷(Myo)</span></strong>! 내 옷이 빵빵한 <strong>근육</strong> 때문에 터질 것 같아!<br><strong><span class='highlight'>오마(Oma)</span></strong>이갓! 내 몸에 <strong>종양</strong>이 생기다니!" }
                ],
                userMnemonics: [
                    { author: "지나가는널스", text: "매끈한(Lei) 마요네즈(Myo) 엄마(Oma)가 만든 종양..." }
                ]
            }
        ];

        // --- 2. 상태 관리 ---
        const currentMnemonicIndex = {};
        const currentUserMnemonicIndex = {};
        const bookmarkedIndices = new Set();
        let toastTimeout;
        let activeTab = 'home'; 

        // 탭 전환
        function switchTab(tabName) {
            activeTab = tabName;
            const searchContainer = document.getElementById('search-container');
            const resultsContainer = document.getElementById('results-container');
            const wordbookContainer = document.getElementById('wordbook-container');
            
            document.getElementById('tab-home').classList.toggle('active', tabName === 'home');
            document.getElementById('tab-wordbook').classList.toggle('active', tabName === 'wordbook');

            if (tabName === 'home') {
                wordbookContainer.style.display = 'none';
                searchContainer.style.display = 'flex';
                if (searchContainer.classList.contains('active')) {
                    resultsContainer.style.display = 'flex';
                }
            } else if (tabName === 'wordbook') {
                searchContainer.style.display = 'none';
                resultsContainer.style.display = 'none';
                wordbookContainer.style.display = 'flex';
                renderWordbook();
            }
        }

        // --- 3. 📸 OCR 이미지 스캔 시뮬레이션 로직 ---
        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // 1. 이미지를 화면에 표시
                    const imgElement = document.getElementById('ocr-image');
                    imgElement.src = e.target.result;
                    
                    // 2. OCR 컨테이너 보이기
                    const ocrContainer = document.getElementById('ocr-container');
                    ocrContainer.style.display = 'block';

                    // 3. 기존 검색창 레이아웃 부드럽게 위로 올리기
                    document.getElementById('search-container').classList.add('active');
                    document.querySelector('h1').style.fontSize = '1.5rem';
                    document.getElementById('results-container').style.display = 'none'; // 기존 결과 숨김

                    // 4. 모의 핫스팟(단어 영역) 렌더링
                    renderMockHotspots();
                }
                reader.readAsDataURL(file);
            }
        }

        function renderMockHotspots() {
            const hotspotsContainer = document.getElementById('ocr-hotspots');
            hotspotsContainer.innerHTML = '';

            // 업로드하신 턱뼈 이미지 기준 대략적인 위치 (백분율)
            // 실제 서비스에서는 AI/Vision API가 좌표(Bounding Box)를 반환해줍니다.
            // 🎯 미세 조정된 OCR 핫스팟 좌표 (이미지 비율에 완벽하게 맞춤)
            const mockData = [
                { 
                    word: "Coronoid process", 
                    top: "41.5%",   // 위에서부터의 위치
                    left: "37.5%",  // 왼쪽에서부터의 위치
                    width: "18.5%", // 박스 가로 넓이
                    height: "5%"    // 박스 세로 높이
                },
                { 
                    word: "Condylar process", 
                    top: "48%", 
                    left: "80%", 
                    width: "18%", 
                    height: "5%" 
                },
                { 
                    word: "Mental foramen", 
                    top: "78.5%", 
                    left: "13.5%", 
                    width: "19%", 
                    height: "5.5%" 
                }
            ];
            mockData.forEach(data => {
                const spot = document.createElement('div');
                spot.className = 'ocr-hotspot';
                spot.style.top = data.top;
                spot.style.left = data.left;
                spot.style.width = data.width;
                spot.style.height = data.height;
                
                // 툴팁 생성
                const tooltip = document.createElement('div');
                tooltip.className = 'ocr-tooltip';
                tooltip.innerText = data.word;
                spot.appendChild(tooltip);

                // 클릭 시 동작: 검색창에 단어 입력 후 변환 실행
                spot.onclick = function() {
                    // 모든 핫스팟의 active 상태 해제 후 클릭된 것만 active
                    document.querySelectorAll('.ocr-hotspot').forEach(el => el.classList.remove('active'));
                    spot.classList.add('active');

                    // 검색창에 단어 삽입
                    const input = document.getElementById('word-input');
                    input.value = data.word;
                    
                    // 자동 검색 실행 (잠시 대기 후 자연스럽게)
                    setTimeout(() => generateMnemonics(data.word), 300);
                };

                hotspotsContainer.appendChild(spot);
            });
        }

        // --- 4. 검색 및 결과 렌더링 로직 ---
        function handleEnter(event) {
            if (event.key === 'Enter') generateMnemonics();
        }

        function generateMnemonics(directWord = null) {
            if(activeTab !== 'home') switchTab('home');

            const searchContainer = document.getElementById('search-container');
            const resultsContainer = document.getElementById('results-container');
            const inputVal = (directWord || document.getElementById('word-input').value).toLowerCase();

            searchContainer.classList.add('active');
            document.querySelector('h1').style.fontSize = '1.5rem';
            resultsContainer.style.display = 'flex';
            resultsContainer.innerHTML = '';

            // 입력된 단어 필터링 (비어있으면 전체 출력, 특정 단어면 해당 단어만)
            let filteredDB = mnemonicDB;
            if (inputVal.trim() !== "") {
                filteredDB = mnemonicDB.filter(item => 
                    item.word.toLowerCase().includes(inputVal) || 
                    item.meaning.includes(inputVal)
                );
            }

            if (filteredDB.length === 0) {
                resultsContainer.innerHTML = '<div style="text-align:center; padding:2rem; color:#6B7280;">검색 결과가 없습니다. AI가 암기법을 생성하는 중입니다...</div>';
                return;
            }

            filteredDB.forEach((item) => {
                // 원본 DB에서의 실제 인덱스 찾기
                const originalIndex = mnemonicDB.findIndex(dbItem => dbItem.word === item.word);
                
                if(currentMnemonicIndex[originalIndex] === undefined) {
                    currentMnemonicIndex[originalIndex] = 0;
                    currentUserMnemonicIndex[originalIndex] = 0;
                }
                
                const card = document.createElement('div');
                card.className = 'word-card';
                card.id = `card-home-${originalIndex}`;
                renderCardHTML(card, originalIndex, item, 'home');
                resultsContainer.appendChild(card);
            });

            // 스크롤 아래로 부드럽게 이동
            if(directWord) {
                setTimeout(() => {
                    resultsContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 100);
            }
        }

        // 단어장 렌더링, HTML 생성 로직, 북마크 토글 기능 등 (이전과 동일)
        function renderWordbook() {
            const wordbookContainer = document.getElementById('wordbook-container');
            wordbookContainer.innerHTML = '';
            if (bookmarkedIndices.size === 0) {
                wordbookContainer.innerHTML = `<div class="empty-state">아직 단어장에 추가된 단어가 없습니다.<br>검색 결과에서 ⭐ 버튼을 눌러 단어를 추가해 보세요!</div>`;
                return;
            }
            bookmarkedIndices.forEach(index => {
                const item = mnemonicDB[index];
                const card = document.createElement('div');
                card.className = 'word-card';
                card.id = `card-wordbook-${index}`; 
                renderCardHTML(card, index, item, 'wordbook');
                wordbookContainer.appendChild(card);
            });
        }

        function toggleBookmark(index) {
            if (bookmarkedIndices.has(index)) {
                bookmarkedIndices.delete(index);
                showToast('단어장에서 삭제되었습니다. 🗑️');
            } else {
                bookmarkedIndices.add(index);
                showToast('나만의 단어장에 추가되었습니다! ⭐');
            }
            document.getElementById('bookmark-count').innerText = bookmarkedIndices.size;
            updateBookmarkIcons(index);
            if (activeTab === 'wordbook') renderWordbook();
        }

        function updateBookmarkIcons(index) {
            const btns = document.querySelectorAll(`.bookmark-btn-${index}`);
            const isBookmarked = bookmarkedIndices.has(index);
            btns.forEach(btn => {
                btn.innerHTML = isBookmarked ? '★' : '☆';
                if(isBookmarked) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function renderCardHTML(cardElement, index, item, viewType) {
            const mnemonic = item.mnemonics[currentMnemonicIndex[index]];
            const isBookmarked = bookmarkedIndices.has(index);
            
            let html = `
                <div class="word-header">
                    <div class="word-title-area">
                        <div class="word-title-top">
                            <h2 class="word-title">${item.word}</h2>
                            <button class="bookmark-btn bookmark-btn-${index} ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark(${index})" title="단어장 추가/삭제">${isBookmarked ? '★' : '☆'}</button>
                        </div>
                        <p>${item.meaning}</p>
                    </div>
                    <div class="feedback-btns">
                        <button class="thumb-btn up" onclick="showToast('이 암기법을 평가했습니다 👍')" title="이 암기법이 좋아요">👍</button>
                        <button class="thumb-btn down" onclick="handleThumbsDown(${index}, '${viewType}')" title="다른 AI 암기법 보기">👎</button>
                    </div>
                </div>
                <div class="mnemonic-content">
                    <span class="mnemonic-tag">${mnemonic.type}</span>
                    <div class="mnemonic-text">${mnemonic.text}</div>
                </div>
            `;

            if (item.userMnemonics && item.userMnemonics.length > 0) {
                const userMnemonic = item.userMnemonics[currentUserMnemonicIndex[index]];
                html += `
                    <hr class="divider">
                    <div class="user-mnemonic-section" id="user-section-${viewType}-${index}">
                        <div class="user-mnemonic-header">
                            <span class="user-mnemonic-title">💡 이런 암기법은 어떠신가요?</span>
                            <div class="user-feedback-btns">
                                <button class="user-thumb-btn up" onclick="showToast('유저 암기법에 투표했습니다! 👏')" title="추천해요">👍</button>
                                <button class="user-thumb-btn down" onclick="handleUserThumbsDown(${index}, '${viewType}')" title="다른 유저 암기법 보기">👎</button>
                            </div>
                        </div>
                        <div class="mnemonic-text">
                            <span class="user-tag">${userMnemonic.author}</span>
                            ${userMnemonic.text}
                        </div>
                    </div>
                `;
            }
            cardElement.innerHTML = html;
        }

        function handleThumbsDown(index, viewType) {
            const item = mnemonicDB[index];
            currentMnemonicIndex[index] = (currentMnemonicIndex[index] + 1) % item.mnemonics.length;
            const cardElement = document.getElementById(`card-${viewType}-${index}`);
            cardElement.style.opacity = '0.5';
            setTimeout(() => {
                renderCardHTML(cardElement, index, item, viewType);
                cardElement.style.opacity = '1';
            }, 150);
        }

        function handleUserThumbsDown(index, viewType) {
            const item = mnemonicDB[index];
            currentUserMnemonicIndex[index] = (currentUserMnemonicIndex[index] + 1) % item.userMnemonics.length;
            const userSection = document.getElementById(`user-section-${viewType}-${index}`);
            userSection.style.opacity = '0.3';
            setTimeout(() => {
                const cardElement = document.getElementById(`card-${viewType}-${index}`);
                renderCardHTML(cardElement, index, item, viewType);
                document.getElementById(`user-section-${viewType}-${index}`).style.opacity = '1';
            }, 150);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            if (toastTimeout) clearTimeout(toastTimeout);
            toast.classList.add('show');
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>
</html>
